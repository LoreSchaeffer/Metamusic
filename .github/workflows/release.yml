name: Automated GitHub Release on Push

on:
  push:
    branches:
      - main

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Extract version from pom.xml
        id: extract_version
        run: |
          POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "Extracted version from POM: $POM_VERSION"
          echo "version=$POM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if Tag already exists
        id: check_tag
        env:
          TAG: ${{ steps.extract_version.outputs.version }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists. Skipping release creation."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG is new. Proceeding with release."
          fi

      - name: Create GitHub Release and Tag
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.extract_version.outputs.version }}
          name: Release ${{ steps.extract_version.outputs.version }}
          generate_release_notes: true